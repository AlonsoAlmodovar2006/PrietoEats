services:
  # 1. El motor de PHP (Tu código Laravel)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prietoeats-app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_NAME: PrietoEats
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "https://prietoeats.alonso.servidorgp.somosdelprieto.com"
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-prietoeats}"
      DB_USERNAME: "${DB_USERNAME:-prietoeats}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: public
      LOG_CHANNEL: stderr

    volumes:
      - ./:/var/www/html
      - app-storage:/var/www/html/storage/app/public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - prietoeats

  # 2. El servidor web que conecta con el Proxy Externo
  web:
    image: nginx:alpine
    container_name: prietoeats-web
    restart: unless-stopped
    environment:
      # Las variables VIRTUAL para el proxy de jwilder se ponen AQUÍ
      VIRTUAL_HOST: prietoeats.alonso.servidorgp.somosdelprieto.com
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: prietoeats.alonso.servidorgp.somosdelprieto.com
      LETSENCRYPT_EMAIL: tuemail@ejemplo.com
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - prietoeats
      - proxy
    depends_on:
      - app

  # 3. La Base de Datos
  db:
    image: mysql:8.0
    container_name: prietoeats-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
      MYSQL_DATABASE: "${DB_DATABASE:-prietoeats}"
      MYSQL_USER: "${DB_USERNAME:-prietoeats}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - prietoeats

# Redes y Volúmenes
networks:
  prietoeats:
    driver: bridge
  proxy:
    external: true

volumes:
  db-data:
  app-storage:
